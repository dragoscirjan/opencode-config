version: "3"

includes:
  generic:
    taskfile: ../generic/Taskfile.yml
    dir: .

vars:
  OC_AGENT: athena
  # Full requirement given upfront so Athena has no reason to ask questions

tasks:
  test:
    desc: "Run all Athena agent tests"
    cmds:
      - task: generic:clean
      - task: prompt-solo-run
      - task: test:solo-spec-exists
      - task: test:solo-hld-metadata
      - task: test:solo-story-created
      - task: test:solo-story-metadata
      - task: test:solo-no-drafts
      - task: test:solo-no-code
      - task: generic:clean
      - task: prompt-team-run
      - task: test:team-spec-exists
      - task: test:team-hld-metadata
      - task: test:team-draft-created
      - task: test:team-story-created
      - task: test:team-story-metadata
      - task: generic:clean

  prompt-solo-run:
    desc: "Athena must write an HLD to .specs/ and create an implementation story"
    cmds:
      - task: generic:run
        vars:
          OC_AGENT: "{{.OC_AGENT}}"
          OC_PROMPT: >-
            Write an HLD for an In-Memory Cache System.
            Do NOT ask clarifying questions — all information is provided below.
            Solo mode, no team review.

            Context: The application currently hits the database on every request.
            We need an in-memory caching layer to reduce DB load and improve
            response times for frequently accessed data.

            Scope IN: key-value store with TTL, LRU eviction, cache invalidation
            on writes, per-key TTL configuration, cache-aside pattern.
            Scope OUT: distributed caching (Redis/Memcached), cache warming
            strategies, multi-level caching, persistent cache.

            Decisions already made:
            - Cache sits in the application process (no external service)
            - Maximum cache size: 10,000 entries
            - Default TTL: 5 minutes

            Risks: Memory pressure on high-cardinality data sets.
            Cache stampede when popular keys expire simultaneously.

  prompt-team-run:
    desc: "Athena team mode — draft reviewed by subagents before finalizing"
    cmds:
      - task: generic:run
        vars:
          OC_AGENT: "{{.OC_AGENT}}"
          OC_PROMPT: >-
            Write an HLD for a Rate Limiter.
            Do NOT ask clarifying questions — all information is provided below.
            Use the team. iterations=1.

            Context: Public API endpoints have no throttling. Abusive clients can
            overwhelm the service. We need a rate limiting layer that sits in
            front of all API routes.

            Scope IN: per-client rate limiting (by API key), sliding window
            algorithm, configurable limits per endpoint, HTTP 429 responses with
            Retry-After header, rate limit headers on every response.
            Scope OUT: DDoS protection (handled at CDN/WAF layer), billing-based
            quotas, geographic rate policies.

            Decisions already made:
            - Token bucket algorithm for simplicity
            - Limits stored in application memory (single-instance for now)
            - Default limit: 100 requests per minute per client

            Risks: Single-instance memory store does not scale to multiple replicas.
            Clock skew between replicas if distributed later.

  # ── Solo Tests ───────────────────────────────────────────────────────────────

  # ── Test 1: Solo mode produces HLD in .specs/ ───────────────────────────────
  test:solo-spec-exists:
    desc: "Athena must create exactly 1 HLD file in .specs/"
    cmds:
      - echo "▶ [1] Solo mode — HLD in .specs/"
      - task: generic:test:path
        vars:
          TEST_PATH: ".specs/"
          TEST_FOLDER: 1
          OK_MESSAGE: ".specs/ directory exists"
          ERR_MESSAGE: ".specs/ not found — Athena did not create specs"
      - task: generic:test:count-files
        vars:
          TEST_DIR: ".specs"
          TEST_PATTERN: "hld-*"
          EXPECTED_COUNT: 1
          OK_MESSAGE: "Exactly 1 HLD file in .specs/"
          ERR_MESSAGE: "Expected 1 HLD file in .specs/"

  # ── Test 2: HLD has correct frontmatter ─────────────────────────────────────
  test:solo-hld-metadata:
    desc: "HLD spec must have type: hld and author attribution"
    cmds:
      - echo "▶ [2] Solo HLD frontmatter checks"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".specs"
          TEST_PATTERN: "hld-*"
          TEST_TEXT: "type: hld"
          OK_MESSAGE: "HLD has type: hld"
          ERR_MESSAGE: "HLD missing type: hld"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".specs"
          TEST_PATTERN: "hld-*"
          TEST_TEXT: 'author: "opencode:agent=athena"'
          OK_MESSAGE: "HLD has author attribution"
          ERR_MESSAGE: "HLD missing author: opencode:agent=athena"

  # ── Test 3: Solo mode creates implementation story in .issues/ ──────────────
  test:solo-story-created:
    desc: "Athena must create exactly 1 implementation story in .issues/"
    cmds:
      - echo "▶ [3] Solo mode — implementation story in .issues/"
      - task: generic:test:path
        vars:
          TEST_PATH: ".issues/"
          TEST_FOLDER: 1
          OK_MESSAGE: ".issues/ directory exists"
          ERR_MESSAGE: ".issues/ not found — Athena did not create stories"
      - task: generic:test:count-files
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          EXPECTED_COUNT: 1
          OK_MESSAGE: "Exactly 1 story file in .issues/"
          ERR_MESSAGE: "Expected 1 story file in .issues/"

  # ── Test 4: Story has correct frontmatter ───────────────────────────────────
  test:solo-story-metadata:
    desc: "Implementation story must have type, status, level/story label, and author"
    cmds:
      - echo "▶ [4] Solo story frontmatter checks"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          TEST_TEXT: "type: story"
          OK_MESSAGE: "Story has type: story"
          ERR_MESSAGE: "Story missing type: story"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          TEST_TEXT: "status: open"
          OK_MESSAGE: "Story has status: open"
          ERR_MESSAGE: "Story missing status: open"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          TEST_TEXT: "level/story"
          OK_MESSAGE: "Story has level/story label"
          ERR_MESSAGE: "Story missing level/story label"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          TEST_TEXT: 'author: "opencode:agent=athena"'
          OK_MESSAGE: "Story has author attribution"
          ERR_MESSAGE: "Story missing author: opencode:agent=athena"

  # ── Test 5: Solo mode must NOT create drafts ────────────────────────────────
  test:solo-no-drafts:
    desc: "Solo mode skips drafts — .ai.tmp/ must not exist"
    cmds:
      - echo "▶ [5] No drafts in solo mode"
      - task: generic:test:not-path
        vars:
          TEST_PATH: ".ai.tmp/"
          TEST_FOLDER: 1
          OK_MESSAGE: ".ai.tmp/ does not exist (correct — solo skips drafts)"
          ERR_MESSAGE: ".ai.tmp/ exists — Athena created drafts in solo mode"

  # ── Test 6: Athena does NOT write code files ────────────────────────────────
  test:solo-no-code:
    desc: "Athena must NOT produce any code files"
    cmds:
      - echo "▶ [6] No code files"
      - task: generic:test:no-files
        vars:
          TEST_DIR: "."
          TEST_EXTENSIONS: '-name "*.js" -o -name "*.ts" -o -name "*.py" -o -name "*.go" -o -name "*.rs" -o -name "*.java"'
          TEST_DEPTH: 1
          OK_MESSAGE: "No code files created in project root (correct)"
          ERR_MESSAGE: "Athena created code files it shouldn't have"

  # ── Team Tests ───────────────────────────────────────────────────────────────

  # ── Test 7: Team mode produces HLD in .specs/ ──────────────────────────────
  test:team-spec-exists:
    desc: "Team mode must create exactly 1 HLD file in .specs/"
    cmds:
      - echo "▶ [7] Team mode — HLD in .specs/"
      - task: generic:test:path
        vars:
          TEST_PATH: ".specs/"
          TEST_FOLDER: 1
          OK_MESSAGE: ".specs/ directory exists"
          ERR_MESSAGE: ".specs/ not found — Athena did not create specs"
      - task: generic:test:count-files
        vars:
          TEST_DIR: ".specs"
          TEST_PATTERN: "hld-*"
          EXPECTED_COUNT: 1
          OK_MESSAGE: "Exactly 1 HLD file in .specs/"
          ERR_MESSAGE: "Expected 1 HLD file in .specs/"

  # ── Test 8: Team HLD has correct frontmatter ───────────────────────────────
  test:team-hld-metadata:
    desc: "Team HLD spec must have type: hld and author attribution"
    cmds:
      - echo "▶ [8] Team HLD frontmatter checks"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".specs"
          TEST_PATTERN: "hld-*"
          TEST_TEXT: "type: hld"
          OK_MESSAGE: "HLD has type: hld"
          ERR_MESSAGE: "HLD missing type: hld"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".specs"
          TEST_PATTERN: "hld-*"
          TEST_TEXT: 'author: "opencode:agent=athena"'
          OK_MESSAGE: "HLD has author attribution"
          ERR_MESSAGE: "HLD missing author: opencode:agent=athena"

  # ── Test 9: Team mode creates draft in .ai.tmp/ ────────────────────────────
  test:team-draft-created:
    desc: "Team mode must create a draft in .ai.tmp/ before finalizing"
    cmds:
      - echo "▶ [9] Team draft artifact check"
      - task: generic:test:path
        vars:
          TEST_PATH: ".ai.tmp/"
          TEST_FOLDER: 1
          OK_MESSAGE: ".ai.tmp/ directory exists (draft was created)"
          ERR_MESSAGE: ".ai.tmp/ not found — Athena skipped the draft step"
      - |
        COUNT=$(find ".ai.tmp" -maxdepth 1 -name "*.md" -type f 2>/dev/null | wc -l | tr -d ' ')
        [ "$COUNT" -ge 1 ] \
          && echo "✓ At least 1 draft file in .ai.tmp/ (found $COUNT)" \
          || { echo "✗ No draft files in .ai.tmp/"; exit 1; }

  # ── Test 10: Team mode creates implementation story ─────────────────────────
  test:team-story-created:
    desc: "Team mode must create exactly 1 implementation story in .issues/"
    cmds:
      - echo "▶ [10] Team mode — implementation story in .issues/"
      - task: generic:test:path
        vars:
          TEST_PATH: ".issues/"
          TEST_FOLDER: 1
          OK_MESSAGE: ".issues/ directory exists"
          ERR_MESSAGE: ".issues/ not found — Athena did not create stories"
      - task: generic:test:count-files
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          EXPECTED_COUNT: 1
          OK_MESSAGE: "Exactly 1 story file in .issues/"
          ERR_MESSAGE: "Expected 1 story file in .issues/"

  # ── Test 11: Team Story has correct frontmatter ─────────────────────────────
  test:team-story-metadata:
    desc: "Team story must have type, status, level/story label, and author"
    cmds:
      - echo "▶ [11] Team story frontmatter checks"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          TEST_TEXT: "type: story"
          OK_MESSAGE: "Story has type: story"
          ERR_MESSAGE: "Story missing type: story"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          TEST_TEXT: "status: open"
          OK_MESSAGE: "Story has status: open"
          ERR_MESSAGE: "Story missing status: open"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          TEST_TEXT: "level/story"
          OK_MESSAGE: "Story has level/story label"
          ERR_MESSAGE: "Story missing level/story label"
      - task: generic:test:find-contains
        vars:
          TEST_DIR: ".issues"
          TEST_PATTERN: "*-story-*"
          TEST_TEXT: 'author: "opencode:agent=athena"'
          OK_MESSAGE: "Story has author attribution"
          ERR_MESSAGE: "Story missing author: opencode:agent=athena"
