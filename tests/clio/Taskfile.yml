version: "3"

includes:
  generic:
    taskfile: ../generic/Taskfile.yml
    dir: .

vars:
  OC_AGENT: clio

tasks:
  docs:serve:
    desc: "Serve MkDocs documentation locally (development)"
    cmds:
      - uv run mkdocs serve

  docs:build:
    desc: "Build MkDocs documentation into site/"
    cmds:
      - uv run mkdocs build --strict

  docs:deploy:
    desc: "Deploy MkDocs documentation to GitHub Pages (requires confirmation)"
    cmds:
      - uv run mkdocs gh-deploy --force

  test:
    desc: "Run all Clio agent tests"
    cmds:
      - task: clean
      - task: seed
      - task: prompt-solo-run
      - task: test:pyproject-exists
      - task: test:pyproject-has-mkdocs
      - task: test:mise-toml-exists
      - task: test:mise-toml-has-python
      - task: test:mkdocs-yml-exists
      - task: test:mkdocs-yml-has-material
      - task: test:mkdocs-yml-has-nav
      - task: test:taskfile-exists
      - task: test:taskfile-has-docs-build
      - task: test:docs-dir-exists
      - task: test:docs-index-exists
      - task: test:no-issues-created
      - task: test:no-specs-created
      - task: clean

  # ── Cleanup helper ──────────────────────────────────────────────────────────
  clean:
    desc: "Remove all Clio-generated artifacts"
    cmds:
      - echo
      - rm -rf docs/ site/ .venv/ .ai.tmp/ .issues/ .specs/
      - rm -f pyproject.toml mise.toml mkdocs.yml uv.lock .python-version *.py
      - rm -f README.md

  # ── Seed a minimal project for Clio to document ─────────────────────────────
  seed:
    desc: "Create a minimal README.md as project context for Clio"
    cmds:
      - |
        cat > README.md << 'EOF'
        # TaskRunner

        A lightweight CLI task runner written in Go.

        ## Features

        - YAML-based task definitions
        - Dependency resolution between tasks
        - Parallel execution with `--parallel` flag
        - Environment variable interpolation
        - `.env` file support

        ## Installation

        ```bash
        go install github.com/example/taskrunner@latest
        ```

        Or download a binary from the [Releases](https://github.com/example/taskrunner/releases) page.

        ## Quick Start

        Create a `tasks.yml`:

        ```yaml
        tasks:
          build:
            cmd: go build -o bin/taskrunner ./cmd/taskrunner
          test:
            cmd: go test ./...
            deps: [build]
        ```

        Run it:

        ```bash
        taskrunner build
        taskrunner test
        ```

        ## Configuration

        TaskRunner reads `tasks.yml` from the current directory.

        | Key | Type | Description |
        |-----|------|-------------|
        | `tasks.<name>.cmd` | string | Shell command to run |
        | `tasks.<name>.deps` | list | Tasks to run first |
        | `tasks.<name>.env` | map | Extra environment variables |
        | `tasks.<name>.dir` | string | Working directory |

        ## License

        MIT
        EOF

  # ── Run Clio ────────────────────────────────────────────────────────────────
  prompt-solo-run:
    desc: "Clio must scaffold toolchain and generate docs for the seeded project"
    cmds:
      - task: generic:run
        vars:
          OC_AGENT: "{{.OC_AGENT}}"
          OC_PROMPT: >-
            Generate MkDocs documentation for this project.
            Do NOT ask clarifying questions — all information is in the README.md.
            Solo mode, no team review.
            Scaffold the full toolchain (uv, mise, mkdocs, Taskfile) and write
            documentation pages. Do NOT run docs:serve. Do NOT deploy.

  # ── Test 1: pyproject.toml exists ───────────────────────────────────────────
  test:pyproject-exists:
    desc: "uv must create pyproject.toml"
    cmds:
      - echo "▶ [1] pyproject.toml exists"
      - task: generic:test:path
        vars:
          TEST_PATH: "pyproject.toml"
          OK_MESSAGE: "pyproject.toml exists"
          ERR_MESSAGE: "pyproject.toml not found — uv init was not run"

  # ── Test 2: pyproject.toml contains mkdocs ──────────────────────────────────
  test:pyproject-has-mkdocs:
    desc: "pyproject.toml must list mkdocs as a dependency"
    cmds:
      - echo "▶ [2] pyproject.toml contains mkdocs"
      - task: generic:test:contains
        vars:
          TEST_PATH: "pyproject.toml"
          TEST_TEXT: "mkdocs"
          OK_MESSAGE: "pyproject.toml contains mkdocs dependency"
          ERR_MESSAGE: "pyproject.toml missing mkdocs dependency"

  # ── Test 3: mise.toml exists ────────────────────────────────────────────────
  test:mise-toml-exists:
    desc: "mise.toml must exist for Python version management"
    cmds:
      - echo "▶ [3] mise.toml exists"
      - task: generic:test:path
        vars:
          TEST_PATH: "mise.toml"
          OK_MESSAGE: "mise.toml exists"
          ERR_MESSAGE: "mise.toml not found — mise config was not created"

  # ── Test 4: mise.toml contains python ───────────────────────────────────────
  test:mise-toml-has-python:
    desc: "mise.toml must reference python"
    cmds:
      - echo "▶ [4] mise.toml contains python"
      - task: generic:test:contains
        vars:
          TEST_PATH: "mise.toml"
          TEST_TEXT: "python"
          OK_MESSAGE: "mise.toml references python"
          ERR_MESSAGE: "mise.toml missing python reference"

  # ── Test 5: mkdocs.yml exists ───────────────────────────────────────────────
  test:mkdocs-yml-exists:
    desc: "mkdocs.yml must exist"
    cmds:
      - echo "▶ [5] mkdocs.yml exists"
      - task: generic:test:path
        vars:
          TEST_PATH: "mkdocs.yml"
          OK_MESSAGE: "mkdocs.yml exists"
          ERR_MESSAGE: "mkdocs.yml not found — MkDocs config was not generated"

  # ── Test 6: mkdocs.yml uses material theme ──────────────────────────────────
  test:mkdocs-yml-has-material:
    desc: "mkdocs.yml must use the material theme"
    cmds:
      - echo "▶ [6] mkdocs.yml uses material theme"
      - task: generic:test:contains
        vars:
          TEST_PATH: "mkdocs.yml"
          TEST_TEXT: "material"
          OK_MESSAGE: "mkdocs.yml uses material theme"
          ERR_MESSAGE: "mkdocs.yml missing material theme"

  # ── Test 7: mkdocs.yml has nav section ──────────────────────────────────────
  test:mkdocs-yml-has-nav:
    desc: "mkdocs.yml must define a nav section"
    cmds:
      - echo "▶ [7] mkdocs.yml has nav section"
      - task: generic:test:contains
        vars:
          TEST_PATH: "mkdocs.yml"
          TEST_TEXT: "nav:"
          OK_MESSAGE: "mkdocs.yml has nav: section"
          ERR_MESSAGE: "mkdocs.yml missing nav: section"

  # ── Test 8: Taskfile.yml exists ─────────────────────────────────────────────
  test:taskfile-exists:
    desc: "Taskfile.yml must exist with docs tasks"
    cmds:
      - echo "▶ [8] Taskfile.yml exists"
      - task: generic:test:path
        vars:
          TEST_PATH: "Taskfile.yml"
          OK_MESSAGE: "Taskfile.yml exists"
          ERR_MESSAGE: "Taskfile.yml not found — docs tasks were not created"

  # ── Test 9: Taskfile.yml has docs:build ─────────────────────────────────────
  test:taskfile-has-docs-build:
    desc: "Taskfile.yml must contain a docs:build task"
    cmds:
      - echo "▶ [9] Taskfile.yml has docs:build"
      - task: generic:test:contains
        vars:
          TEST_PATH: "Taskfile.yml"
          TEST_TEXT: "docs:build"
          OK_MESSAGE: "Taskfile.yml contains docs:build task"
          ERR_MESSAGE: "Taskfile.yml missing docs:build task"

  # ── Test 10: docs/ directory exists ─────────────────────────────────────────
  test:docs-dir-exists:
    desc: "docs/ directory must exist with documentation pages"
    cmds:
      - echo "▶ [10] docs/ directory exists"
      - task: generic:test:path
        vars:
          TEST_PATH: "docs/"
          TEST_FOLDER: 1
          OK_MESSAGE: "docs/ directory exists"
          ERR_MESSAGE: "docs/ not found — no documentation pages were written"

  # ── Test 11: docs/index.md exists ───────────────────────────────────────────
  test:docs-index-exists:
    desc: "docs/index.md must exist as the home page"
    cmds:
      - echo "▶ [11] docs/index.md exists"
      - task: generic:test:path
        vars:
          TEST_PATH: "docs/index.md"
          OK_MESSAGE: "docs/index.md exists"
          ERR_MESSAGE: "docs/index.md not found — home page was not written"

  # ── Test 12: No .issues/ created ────────────────────────────────────────────
  test:no-issues-created:
    desc: "Clio must NOT create .issues/ — that is Hermes' domain"
    cmds:
      - echo "▶ [12] No .issues/ pollution"
      - task: generic:test:not-path
        vars:
          TEST_PATH: ".issues/"
          TEST_FOLDER: 1
          OK_MESSAGE: ".issues/ does not exist (correct — Clio doesn't create issues)"
          ERR_MESSAGE: ".issues/ exists — Clio created issues it shouldn't have"

  # ── Test 13: No .specs/ created ─────────────────────────────────────────────
  test:no-specs-created:
    desc: "Clio must NOT create .specs/ — that is Athena's domain"
    cmds:
      - echo "▶ [13] No .specs/ pollution"
      - task: generic:test:not-path
        vars:
          TEST_PATH: ".specs/"
          TEST_FOLDER: 1
          OK_MESSAGE: ".specs/ does not exist (correct — Clio doesn't write specs)"
          ERR_MESSAGE: ".specs/ exists — Clio wrote specs it shouldn't have"
